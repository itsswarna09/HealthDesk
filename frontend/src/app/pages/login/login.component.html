<div class="auth-wrapper">
  <div class="auth-card">

    <div class="auth-header">
      <div class="brand">
        <span class="brand-icon">⚕</span>
        <span class="brand-name">HealthDesk</span>
      </div>
      <h1>Welcome back</h1>
      <p>Sign in to your healthcare account</p>
    </div>

    <form [formGroup]="form" (ngSubmit)="submit()" class="auth-form">

      <div class="field">
        <label for="email">Email address</label>
        <input
          id="email"
          type="email"
          formControlName="email"
          placeholder="you@example.com"
          [class.invalid]="form.get('email')?.invalid && form.get('email')?.touched"
        />
        @if (form.get('email')?.invalid && form.get('email')?.touched) {
          <span class="field-error">Enter a valid email address.</span>
        }
      </div>

      <div class="field">
        <label for="password">Password</label>
        <input
          id="password"
          type="password"
          formControlName="password"
          placeholder="••••••••"
          [class.invalid]="form.get('password')?.invalid && form.get('password')?.touched"
        />
        @if (form.get('password')?.invalid && form.get('password')?.touched) {
          <span class="field-error">Password is required.</span>
        }
      </div>

      <button type="submit" class="btn-primary" [disabled]="loading">
        @if (loading) { <span class="spinner"></span> Signing in… }
        @else { Sign In }
      </button>

    </form>

    <p class="auth-footer">
      Don't have an account? <a routerLink="/register">Create one</a>
    </p>

  </div>
</div>
